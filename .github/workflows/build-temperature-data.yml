name: Build temperature data and plot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/build-temperature-data.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Open-Meteo source data
        run: python scripts/download_data.py

      - name: Build combined CSV and interactive HTML
        run: python scripts/plot_temperature.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/source data/processed docs/daily_temperature_trend_interactive.html
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Build temperature data and interactive plot"
            git push
          fi
